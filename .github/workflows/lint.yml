name: Test, Lint, TSC

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # TODO: Add back when this repository has tests
      # - name: Run tests
      #   run: bun test

      - name: Run lint
        run: bun run lint

      - name: Run TypeScript
        run: bunx tsc --noEmit
