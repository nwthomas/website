<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor — ASCII</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap");

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --bg: #09090b;
    --fg: #e4e4e7;
    --dim: #52525b;
    --accent: #a78bfa;
    --glow: rgba(167, 139, 250, 0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle vignette */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%);
    pointer-events: none;
    z-index: 10;
  }

  /* Scanline overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.06) 2px,
      rgba(0, 0, 0, 0.06) 4px
    );
    pointer-events: none;
    z-index: 11;
  }

  .container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  #ascii-canvas {
    font-size: clamp(4px, 0.85vw, 9px);
    line-height: 1.15;
    letter-spacing: 0.04em;
    white-space: pre;
    text-align: center;
    color: var(--fg);
    text-shadow:
      0 0 8px var(--glow),
      0 0 20px rgba(167, 139, 250, 0.04);
    transition: opacity 0.3s ease;
    user-select: none;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    z-index: 20;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s forwards;
  }

  .btn {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--dim);
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:hover {
    color: var(--fg);
    border-color: rgba(255, 255, 255, 0.16);
    background: rgba(255, 255, 255, 0.06);
  }

  .btn.active {
    color: var(--accent);
    border-color: rgba(167, 139, 250, 0.3);
    background: rgba(167, 139, 250, 0.06);
  }

  .speed-label {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .frame-counter {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <pre id="ascii-canvas"></pre>
  <div class="controls">
    <button class="btn active" id="btn-play" onclick="togglePlay()">Pause</button>
    <button class="btn" onclick="setSpeed(0.5)">0.5x</button>
    <button class="btn" onclick="setSpeed(0.8)">0.8x</button>
    <button class="btn active" onclick="setSpeed(1)">1x</button>
    <button class="btn" onclick="setSpeed(2)">2x</button>
    <span class="frame-counter" id="frame-counter">01 / 38</span>
  </div>
</div>

const FPS = 25;
const canvas = document.getElementById("ascii-canvas");
const counter = document.getElementById("frame-counter");
const btnPlay = document.getElementById("btn-play");

let currentFrame = 0;
let playing = true;
let speed = 1;
let lastTime = 0;
let accumulator = 0;

function render(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const delta = timestamp - lastTime;
  lastTime = timestamp;

  if (playing) {
    accumulator += delta;
    const interval = 1000 / (FPS * speed);
    while (accumulator >= interval) {
      accumulator -= interval;
      currentFrame = (currentFrame + 1) % FRAMES.length;
    }
  }

  canvas.textContent = FRAMES[currentFrame];
  const f = String(currentFrame + 1).padStart(2, "0");
  counter.textContent = f + " / " + FRAMES.length;

  requestAnimationFrame(render);
}

function togglePlay() {
  playing = !playing;
  btnPlay.textContent = playing ? "Pause" : "Play";
  btnPlay.classList.toggle("active", playing);
  if (playing) { lastTime = 0; accumulator = 0; }
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll(".controls .btn:not(#btn-play)").forEach(b => {
    b.classList.toggle("active", parseFloat(b.textContent) === s);
  });
  accumulator = 0;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); togglePlay(); }
  if (e.code === "ArrowRight") { currentFrame = (currentFrame + 1) % FRAMES.length; }
  if (e.code === "ArrowLeft") { currentFrame = (currentFrame - 1 + FRAMES.length) % FRAMES.length; }
});

requestAnimationFrame(render);
</script>
